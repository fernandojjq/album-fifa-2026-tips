<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4380D"/>
      <stop offset="100%" style="stop-color:#722F17"/>
    </linearGradient>
  </defs>
  <!-- Ball background -->
  <circle cx="50" cy="50" r="48" fill="url(#ballGradient)"/>
  <!-- Hexagon pattern (simplified football ball design) -->
  <path d="M50 10 L65 25 L65 45 L50 55 L35 45 L35 25 Z" fill="none" stroke="#F5A623" stroke-width="2"/>
  <path d="M50 55 L65 45 L80 45 L80 65 L65 75 L50 65" fill="none" stroke="#F5A623" stroke-width="2"/>
  <path d="M50 55 L35 45 L20 45 L20 65 L35 75 L50 65" fill="none" stroke="#F5A623" stroke-width="2"/>
  <!-- Center pentagon -->
  <path d="M50 35 L58 42 L55 52 L45 52 L42 42 Z" fill="#F5A623"/>
  <!-- Football lines -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#FDF8F3" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Number 26 -->
  <text x="50" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FDF8F3" text-anchor="middle">26</text>
</svg>